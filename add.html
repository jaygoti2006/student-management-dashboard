<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="./output_add.css">
    <script defer src="script_add.js"></script>
</head>

<body>
    <div class="mb-8">
        <div class="progress relative mx-auto mt-5">
            <div class="badge badge-current left-[calc((100%)/6)] absolute flex justify-center items-center">
                1
            </div>
            <div class="badge left-[calc((200%)/6)] absolute flex justify-center items-center badge-upcoming">
                2
            </div>
            <div class="badge left-[calc((300%)/6)] absolute flex justify-center items-center badge-upcoming">
                3
            </div>
            <div class="badge left-[calc((400%)/6)] absolute flex justify-center items-center badge-upcoming">
                4
            </div>
            <div class="badge left-[calc((500%)/6)] absolute flex justify-center items-center badge-upcoming">
                5
            </div>
            <div class="badge left-[calc(100%)] absolute flex justify-center items-center badge-upcoming">
                6
            </div>
            <div class="progress-fill w-[calc((100%)/6)] absolute">
            </div>
        </div>
    </div>

    <template id="error-template">
        <div class="text-red-600 flex items-center gap-1 text-[13px] error mt-1">

                <path

            </svg>
            <p class="error-message"></p>
        </div>
    </template>

    <div class="w-[50%] mx-auto shadow-md bg-neutral-50 p-10 mb-8 rounded-lg section-container">
        <div class="sec1 sec">
            <form action="">
                <div class="flex gap-5 mb-5">
                    <div class="flex-1 shrink min-w-0">
                        <label class="flex flex-col gap-1"><span>First Name<span
                                    class="text-red-600">*</span></span><input name="firstName"
                                placeholder="Enter First Name" type="text" data-validation-type="required name" />


                        </label>
                    </div>
                    <div class="flex-1 shrink min-w-0">
                        <label class="flex flex-col gap-1"><span>Middle Name</span><input name="middleName"
                                placeholder="Enter Middle Name" type="text" data-validation-type="name" />



                        </label>

                    </div>
                    <div class="flex-1 shrink min-w-0">
                        <label class="flex flex-col gap-1"><span>Last Name<span
                                    class="text-red-600">*</span></span><input name="lastName"
                                placeholder="Enter Last Name" data-validation-type="required name" type="text" />


                        </label>

                    </div>
                </div>
                <div class="mb-5">
                    <label class="flex flex-col gap-1">
                        <span>Email<span class="text-red-600">*</span></span>
                        <input name="email" placeholder="Enter Email" type="email"
                            data-validation-type="required email" />
                        <div class="text-red-600 flex items-center gap-1 text-[13px] error hidden">
                            <svg class="fill-current" xmlns="http://www.w3.org/2000/svg" width="17" height="17"
                                viewBox="0 0 2048 2048">
                                <path
                                    d="M960 0q133 0 255 34t230 96t194 150t150 195t97 229t34 256q0 133-34 255t-96 230t-150 194t-195 150t-229 97t-256 34q-133 0-255-34t-230-96t-194-150t-150-195t-97-229T0 960q0-133 34-255t96-230t150-194t195-150t229-97T960 0zm0 1792q114 0 220-30t199-84t169-130t130-168t84-199t30-221q0-114-30-220t-84-199t-130-169t-168-130t-199-84t-221-30q-115 0-221 30t-198 84t-169 130t-130 168t-84 199t-30 221q0 114 30 220t84 199t130 169t168 130t199 84t221 30zM896 512h128v640H896V512zm0 768h128v128H896v-128z" />
                            </svg>
                            <p class="error-message"></p>
                        </div>

                    </label>
                </div>
                <div class="flex gap-5 mb-5">
                    <div class="flex-1 shrink min-w-0">
                        <label class="flex flex-col gap-1"><span>Mobile<span class="text-red-600">*</span></span>
                            <section class="flex">
                                <select name="mobileCountryCode"
                                    class="rounded-r-none border-r-0 cursor-pointer country-code shrink min-w-0 max-w-25 px-0"></select>
                                <input class="rounded-l-none flex-1" inputmode="numeric" pattern="[0-9]*"
                                    placeholder="Enter Mobile" data-validation-type="required mobile" type="text"
                                    name="mobile" maxlength="10" />
                            </section>
                        </label>

                    </div>
                    <div class="flex-1 shrink min-w-0">
                        <label class="flex flex-col gap-1"><span>Alternate Mobile</span>
                            <section class="flex">
                                <select name="alternateMobileCountryCode"
                                    class="rounded-r-none border-r-0 cursor-pointer country-code shrink min-w-0 max-w-25 px-0"></select>
                                <input class="rounded-l-none flex-1" inputmode="numeric" pattern="[0-9]*" placeholder="Enter Alternate Mobile"
                                    type="text" data-validation-type="mobile" name="alternateMobile" maxlength="10" />
                            </section>
                        </label>

                    </div>
                </div>
                <div class="flex gap-5 mb-5">
                    <div class="flex-1 shrink min-w-0">
                        <label class="flex flex-col gap-1 gender"><span>Gender<span
                                    class="text-red-600">*</span></span><select name="gender" class="cursor-pointer"
                                data-validation-type="required">
                                <option value="">Select Gender</option>
                                <option value="male">Male</option>
                                <option value="female">Female</option>
                            </select>

                        </label>

                    </div>
                    <div class="flex-1 shrink min-w-0">
                        <label class="flex flex-col gap-1 dob"><span>Date of Birth<span
                                    class="text-red-600">*</span></span><input name="dateOfBirth" class="cursor-pointer"
                                type="date" data-validation-type="required date" />

                        </label>

                    </div>
                    <div class="flex-1 shrink min-w-0">
                        <label class="flex flex-col gap-1 blood-group"><span>Blood Group</span><select name="bloodGroup"
                                class="cursor-pointer">
                                <option value="none">None</option>
                                <option value="A+">A+</option>
                                <option value="A-">A-</option>
                                <option value="AB+">AB+</option>
                                <option value="AB-">AB-</option>
                                <option value="B+">B+</option>
                                <option value="B-">B-</option>
                                <option value="O+">O+</option>
                                <option value="O-">O-</option>
                            </select>

                        </label>

                    </div>
                </div>
                <div class="mb-5">
                    <label class="block mb-1 text-zinc-700 text-[14px]" for="profile-photo">Profile Photo</label>
                    <input name="profilePhoto"
                        class="profile-photo cursor-pointer profile-pic file:bg-neutral-200 file:rounded-l-md file:py-1 file:px-3 file:cursor-pointer file:border-r file:border-r-neutral-400"
                        type="file" accept="image/*" id="profile-photo">
                </div>
            </form>
            <div class="flex justify-end">
                <button class="btn flex items-center gap-1 next" type="button">
                    <span>next</span>
                    <span>
                        <svg class="stroke-current" height="15" viewbox="0 0 24 24" width="15"
                            xmlns="http://www.w3.org/2000/svg">
                            <path d="m7 2l10 10L7 22" fill="none" stroke-width="2"></path>
                        </svg>
                    </span>
                </button>
            </div>
        </div>

        <div class="sec2 sec hidden">
            <form action="">
                <div class="mb-8 curr">
                    <h4 class="font-semibold text-zinc-700 mb-5">Current Address<span class="text-red-600">*</span></h4>
                    <div class="mb-5">
                        <label class="flex flex-col gap-1">
                            <span>Address<span class="text-red-600">*</span></span>
                            <input name="address" class="address" placeholder="Enter Address" type="text"
                                data-validation-type="required" />



                        </label>
                    </div>
                    <div class="flex gap-5 mb-5">
                        <div class="flex-1 shrink min-w-0">
                            <label class="flex flex-col gap-1"><span>Country<span
                                        class="text-red-600">*</span></span><select name="country"
                                    class="cursor-pointer country" data-validation-type="required">
                                    <option value="">Select a Country</option>
                                </select>

                            </label>

                        </div>
                        <div class="flex-1 shrink min-w-0">
                            <label class="flex flex-col gap-1"><span>State<span
                                        class="text-red-600">*</span></span><select name="state"
                                    class="cursor-pointer state" data-validation-type="required">
                                    <option value="">Select a State</option>
                                </select>

                            </label>

                        </div>
                        <div class="flex-1 shrink min-w-0">
                            <label class="flex flex-col gap-1"><span>City<span
                                        class="text-red-600">*</span></span><select name="city"
                                    class="cursor-pointer city" data-validation-type="required">
                                    <option value="">Select a City</option>
                                </select>

                            </label>

                        </div>
                    </div>
                    <div class="mb-5">

                                viewBox="0 0 2048 2048">
                                <path
                                    d="M960 0q133 0 255 34t230 96t194 150t150 195t97 229t34 256q0 133-34 255t-96 230t-150 194t-195 150t-229 97t-256 34q-133 0-255-34t-230-96t-194-150t-150-195t-97-229T0 960q0-133 34-255t96-230t150-194t195-150t229-97T960 0zm0 1792q114 0 220-30t199-84t169-130t130-168t84-199t30-221q0-114-30-220t-84-199t-130-169t-168-130t-199-84t-221-30q-115 0-221 30t-198 84t-169 130t-130 168t-84 199t-30 221q0 114 30 220t84 199t130 169t168 130t199 84t221 30zM896 512h128v640H896V512zm0 768h128v128H896v-128z" />
                            </svg>
                            <p class="error-message"></p>
                        </div>
                    </div>
                </div>
                <div class="mb-5 perm">
                    <h4 class="font-semibold text-zinc-700 mb-5">Permanent Address</h4>
                    <button class="btn mb-5 same-address-btn" type="button">Same as Above</button>
                    <div class="mb-5">
                        <label class="flex flex-col gap-1">
                            <span>Address</span>
                            <input name="address" class="address" placeholder="Enter Address" type="text" />



                        </label>
                    </div>
                    <div class="flex gap-5 mb-5">
                        <div class="flex-1 shrink min-w-0 shrink min-w-0">
                            <label class="flex flex-col gap-1"><span>Country</span><select name="country"
                                    class="cursor-pointer country">
                                    <option value="">Select a Country</option>
                                </select>

                            </label>

                        </div>
                        <div class="flex-1 shrink min-w-0 shrink min-w-0">
                            <label class="flex flex-col gap-1"><span>State</span><select name="state"
                                    class="cursor-pointer state">
                                    <option value="">Select a State</option>
                                </select>

                            </label>

                        </div>
                        <div class="flex-1 shrink min-w-0 shrink min-w-0">
                            <label class="flex flex-col gap-1"><span>City</span><select name="city"
                                    class="cursor-pointer city">
                                    <option value="">Select a City</option>
                                </select>

                            </label>

                        </div>
                    </div>
                    <div class="mb-5">
                        <label class="block mb-1 text-zinc-700 text-[14px]">Pin code</label>
                        <input name="pincode" class="mb-1 pincode" placeholder="Enter Pin code" type="text"
                            maxlength="6" data-validation-type="pincode" />
                        <div class="text-red-600 flex items-center gap-1 text-[13px] error hidden">
                            <svg class="fill-current" xmlns="http://www.w3.org/2000/svg" width="17" height="17"
                                viewBox="0 0 2048 2048">
                                <path
                                    d="M960 0q133 0 255 34t230 96t194 150t150 195t97 229t34 256q0 133-34 255t-96 230t-150 194t-195 150t-229 97t-256 34q-133 0-255-34t-230-96t-194-150t-150-195t-97-229T0 960q0-133 34-255t96-230t150-194t195-150t229-97T960 0zm0 1792q114 0 220-30t199-84t169-130t130-168t84-199t30-221q0-114-30-220t-84-199t-130-169t-168-130t-199-84t-221-30q-115 0-221 30t-198 84t-169 130t-130 168t-84 199t-30 221q0 114 30 220t84 199t130 169t168 130t199 84t221 30zM896 512h128v640H896V512zm0 768h128v128H896v-128z" />
                            </svg>
                            <p class="error-message"></p>
                        </div>
                    </div>
                </div>
            </form>
            <div class="flex justify-between">
                <button class="btn flex items-center gap-1 previous" type="button">
                    <span>
                        <svg class="stroke-current" height="15" viewbox="0 0 24 24" width="15"
                            xmlns="http://www.w3.org/2000/svg">
                            <path d="M17 2L7 12l10 10" fill="none" stroke-width="2"></path>
                        </svg>
                    </span>
                    <span>previous</span>
                </button>
                <button class="btn flex items-center gap-1 next" type="button">
                    <span>next</span>
                    <span>
                        <svg class="stroke-current" height="15" viewbox="0 0 24 24" width="15"
                            xmlns="http://www.w3.org/2000/svg">
                            <path d="m7 2l10 10L7 22" fill="none" stroke-width="2"></path>
                        </svg>
                    </span>
                </button>
            </div>
        </div>

        <div class="sec3 sec hidden">
            <form action="">
                <div class="flex gap-5 mb-5">
                    <div class="flex-1 shrink min-w-0">
                        <label class="flex flex-col gap-1"><span>Admission Number<span
                                    class="text-red-600">*</span></span><input name="admissionNo"
                                placeholder="Enter Admission Number" type="text" class="admission-number"
                                data-validation-type="required number" />



                        </label>

                    </div>
                    <div class="flex-1 shrink min-w-0">
                        <label class="flex flex-col gap-1 admission-date"><span>Admission Date<span
                                    class="text-red-600">*</span></span><input name="admissionDate"
                                class="cursor-pointer" type="date" data-validation-type="required date" />



                        </label>

                    </div>
                    <div class="flex-1 shrink min-w-0">
                        <label class="flex flex-col gap-1 academic-year"><span>Academic Year<span
                                    class="text-red-600">*</span></span><select name="academicYear"
                                class="cursor-pointer" data-validation-type="required">
                                <option value="">Select Academic Year</option>
                                <option value="2026-27">2026-27</option>
                            </select>



                        </label>

                    </div>
                </div>
                <div class="flex gap-5 mb-8">
                    <div class="flex-1 shrink min-w-0">
                        <label class="flex flex-col gap-1 class-field"><span>Class<span
                                    class="text-red-600">*</span></span><select name="class" class="cursor-pointer"
                                data-validation-type="required">
                                <option value="">Select Class</option>
                            </select>



                        </label>

                    </div>
                    <div class="flex-1 shrink min-w-0">
                        <label class="flex flex-col gap-1 division"><span>Division<span
                                    class="text-red-600">*</span></span><select name="division" class="cursor-pointer"
                                data-validation-type="required">
                                <option value="">Select Division</option>
                                <option value="A">A</option>
                                <option value="B">B</option>
                                <option value="C">C</option>
                                <option value="D">D</option>
                            </select>



                        </label>

                    </div>
                    <div class="flex-1 shrink min-w-0">
                        <label class="flex flex-col gap-1"><span>Fee Status<span
                                    class="text-red-600">*</span></span><select name="feeStatus" class="cursor-pointer"
                                data-validation-type="required">
                                <option value="">Select Fee Status</option>
                                <option value="pending">Pending</option>
                                <option value="completed">Completed</option>
                            </select>



                        </label>

                    </div>
                    <div class="flex-1 shrink min-w-0">
                        <label class="flex flex-col gap-1"><span>Roll Number<span
                                    class="text-red-600">*</span></span><input name="rollNumber" class="roll-number"
                                inputmode="numeric" pattern="[0-9]*" placeholder="Enter Roll Number" type="text"
                                data-validation-type="required number" />



                        </label>

                    </div>
                </div>
            </form>
            <div class="flex justify-between">
                <button class="btn flex items-center gap-1 previous" type="button">
                    <span>
                        <svg class="stroke-current" height="15" viewbox="0 0 24 24" width="15"
                            xmlns="http://www.w3.org/2000/svg">
                            <path d="M17 2L7 12l10 10" fill="none" stroke-width="2"></path>
                        </svg>
                    </span>
                    <span>previous</span>
                </button>
                <button class="btn flex items-center gap-1 next" type="button">
                    <span>next</span>
                    <span>
                        <svg class="stroke-current" height="15" viewbox="0 0 24 24" width="15"
                            xmlns="http://www.w3.org/2000/svg">
                            <path d="m7 2l10 10L7 22" fill="none" stroke-width="2"></path>
                        </svg>
                    </span>
                </button>
            </div>
        </div>

        <div class="sec4 sec hidden">
            <h4 class="font-semibold text-xl text-center text-zinc-700">Add Parent Information</h4>
            <template class="form-template">
                <form action="" class="py-4">
                    <div class="flex justify-end">
                        <button
                            class="btn hover:text-red-500 hover:bg-red-200 hover:border-red-500 transition-all h-8.25 w-8.25 flex justify-center items-center text-zinc-700 del-btn"
                            type="button">
                            <svg class="block stroke-current fill-none" xmlns="http://www.w3.org/2000/svg" width="22"
                                height="22" viewBox="0 0 24 24">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                    d="M4 6h16l-1.58 14.22A2 2 0 0 1 16.432 22H7.568a2 2 0 0 1-1.988-1.78L4 6Zm3.345-2.853A2 2 0 0 1 9.154 2h5.692a2 2 0 0 1 1.81 1.147L18 6H6l1.345-2.853ZM2 6h20m-12 5v5m4-5v5">
                                </path>
                            </svg>
                        </button>
                    </div>
                    <div class="flex gap-5 mb-5">
                        <div class="flex-1 shrink min-w-0">
                            <label class="flex flex-col gap-1 relation"><span>Relation<span
                                        class="text-red-600">*</span></span><select name="relation"
                                    class="cursor-pointer primary" data-validation-type="required">
                                    <option value="">Select Relation</option>
                                    <option value="father">Father</option>
                                    <option value="mother">Mother</option>
                                    <option value="guardian">Guardian</option>
                                </select>


                            </label>

                        </div>
                        <div class="flex-1 shrink min-w-0">
                            <label class="flex flex-col gap-1"><span>Name<span
                                        class="text-red-600">*</span></span><input name="name" placeholder="Enter Name"
                                    data-validation-type="required name" type="text" />


                            </label>

                        </div>
                    </div>
                    <div class="flex gap-5 mb-5">
                        <div class="flex-1 shrink min-w-0">
                            <label class="flex flex-col gap-1"><span>Mobile<span class="text-red-600">*</span></span>
                                <section class="flex">
                                    <select name="mobileCountryCode"
                                        class="rounded-r-none border-r-0 cursor-pointer country-code shrink min-w-0 max-w-25 px-0"></select>
                                    <input class="rounded-l-none flex-1" name="mobile" inputmode="numeric" pattern="[0-9]*" placeholder="Enter Mobile"
                                        data-validation-type="required mobile" type="text" maxlength="10" />
                                </section>
                            </label>

                        </div>
                        <div class="flex-1 shrink min-w-0">
                            <label class="flex flex-col gap-1"><span>Email</span><input name="email"
                                    data-validation-type="email" placeholder="Enter Email" type="email" />
                            </label>

                        </div>
                    </div>
                    <div class="flex gap-5 mb-8">
                        <div class="flex-1 shrink min-w-0">
                            <label class="flex flex-col gap-1 occupation"><span>Occupation</span><input
                                    name="occupation" placeholder="Enter Occupation" type="text" />
                            </label>

                        </div>
                        <div class="flex-1 shrink min-w-0">
                            <label class="flex flex-col gap-1 annual-income"><span>Annual Income(in Rs)</span><input
                                    name="annualIncome" inputmode="numeric" placeholder="Enter Annual Income"
                                    type="text" class="income" data-validation-type="number" />
                            </label>
                        </div>
                    </div>
                    <hr class="text-neutral-500" />
                </form>
            </template>

            <div class="form-container">
                <form action="" class="py-4">
                    <div class="flex gap-5 mb-5">
                        <div class="flex-1 shrink min-w-0">
                            <label class="flex flex-col gap-1 relation"><span>Relation<span
                                        class="text-red-600">*</span></span><select name="relation"
                                    class="cursor-pointer primary" data-validation-type="required">
                                    <option value="">Select Relation</option>
                                    <option value="father">Father</option>
                                    <option value="mother">Mother</option>

                                </select>

                        </div>
                        <div class="flex-1 shrink min-w-0">
                            <label class="flex flex-col gap-1"><span>Name<span
                                        class="text-red-600">*</span></span><input name="name" placeholder="Enter Name"
                                    data-validation-type="required name" type="text" />


                            </label>

                        </div>
                    </div>
                    <div class="flex gap-5 mb-5">

                            <label class="flex flex-col gap-1"><span>Mobile<span class="text-red-600">*</span></span>
                                <section class="flex">
                                    <select name="mobileCountryCode"

                                    <input class="rounded-l-none flex-1" name="mobile" inputmode="numeric" pattern="[0-9]*" placeholder="Enter Mobile"

                                </section>
                            </label>

                        <div class="flex-1 shrink min-w-0">
                            <label class="flex flex-col gap-1"><span>Email</span><input name="email"
                                    placeholder="Enter Email" type="email" data-validation-type="email" />


                            </label>

                        </div>
                    </div>
                    <div class="flex gap-5 mb-8">
                        <div class="flex-1 shrink min-w-0">
                            <label class="flex flex-col gap-1 occupation"><span>Occupation</span><input
                                    name="occupation" placeholder="Enter Occupation" type="text" />


                            </label>

                        </div>
                        <div class="flex-1 shrink min-w-0">
